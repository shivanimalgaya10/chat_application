name: DevOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  BACKEND_IMAGE: madhul423/devops-backend
  FRONTEND_IMAGE: madhul423/devops-frontend
  TF_VERSION: 1.6.6

jobs:

  build-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1 Checkout Code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2 DockerHub Login
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend
      run: docker build -t $BACKEND_IMAGE:${{ github.sha }} -f backend/Dockerfile backend
    # 4 Push Backend
    - name: Push Backend
      run: docker push $BACKEND_IMAGE:${{ github.sha }}

    # 5 Build Frontend
    - name: Build Frontend
      run: docker build -t $FRONTEND_IMAGE:${{ github.sha }} -f frontend/Dockerfile frontend

    # 6 Push Frontend
    - name: Push Frontend
      run: docker push $FRONTEND_IMAGE:${{ github.sha }}

    # 7 Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: $TF_VERSION

    # 8 Terraform Init
    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    # 9 Terraform Apply
    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply -auto-approve
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    # 10 Get EC2 IP
    - name: Get Server IP
      id: tf_output
      working-directory: terraform
      run: |
        echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

    # 11 Setup SSH
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/first-keypair.pem
        chmod 600 ~/.ssh/key.pem

    # 12 Install Ansible
    - name: Install Ansible
      run: |
        sudo apt update
        sudo apt install -y ansible

    # 13 Add host
    - name: Add EC2 to known hosts
      run: |
        ssh-keyscan -H ${{ steps.tf_output.outputs.ip }} >> ~/.ssh/known_hosts

    # 14 Run Ansible
    - name: Run Ansible Playbook
      run: |
        ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook \
        -i "${{ steps.tf_output.outputs.ip }}," \
        --private-key ~/.ssh/first-keypair.pem \
        -u ubuntu \
        ansible/deploy.yml