- hosts: all
  become: true

  vars:
    image_tag: "{{ image_tag }}"

  tasks:

  # -------------------------
  # Install Docker
  # -------------------------
  - name: Install Docker
    apt:
      name: docker.io
      state: present
      update_cache: yes

  - name: Start Docker
    service:
      name: docker
      state: started
      enabled: true

  - name: Add ubuntu to docker group
    user:
      name: ubuntu
      groups: docker
      append: yes

  # -------------------------
  # Install kubectl
  # -------------------------
  - name: Install kubectl
    shell: |
      curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
      install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

  # -------------------------
  # Install Minikube
  # -------------------------
  - name: Install Minikube
    shell: |
      curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
      install minikube-linux-amd64 /usr/local/bin/minikube

  # -------------------------
  # Start Minikube
  # -------------------------
  - name: Reset SSH connection
    meta: reset_connection
    
  - name: Start Minikube
    become_user: ubuntu
    shell: |
      minikube start --driver=docker --memory=3500 --cpus=2
    args:
      creates: /home/ubuntu/.minikube

  # -------------------------
  # Enable Ingress (optional)
  # -------------------------
  - name: Enable Ingress
    become_user: ubuntu
    shell: minikube addons enable ingress

  # -------------------------
  # Copy Kubernetes files
  # -------------------------
  - name: Copy Kubernetes manifests
    copy:
      src: ../kubernetes/
      dest: /home/ubuntu/kubernetes/

  # -------------------------
  # Replace Image Tags
  # -------------------------
  - name: Replace backend image tag
    replace:
      path: /home/ubuntu/kubernetes/b-deployment.yml
      regexp: 'IMAGE_TAG'
      replace: "{{ image_tag }}"

  - name: Replace frontend image tag
    replace:
      path: /home/ubuntu/kubernetes/f-deployment.yml
      regexp: 'IMAGE_TAG'
      replace: "{{ image_tag }}"

  # -------------------------
  # Apply manifests
  # -------------------------
  - name: Deploy to Minikube
    become_user: ubuntu
    shell: |
      kubectl apply -f /home/ubuntu/kubernetes/

