- name: Deploy Chat App to Kubernetes (kind)
  hosts: all
  become: true

  tasks:

    # ─── SYSTEM SETUP ───────────────────────────────────────────

    - name: Update packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset ssh connection
      meta: reset_connection

    # ─── INSTALL TOOLS ──────────────────────────────────────────

    - name: Install kind
      shell: |
        curl -Lo /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
        chmod +x /usr/local/bin/kind

    - name: Install kubectl
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        mv kubectl /usr/local/bin/kubectl

    # ─── KIND CLUSTER ───────────────────────────────────────────

    - name: Copy kind config
      copy:
        dest: /tmp/kind-config.yml
        content: |
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              extraPortMappings:
                - containerPort: 30000
                  hostPort: 3000
                  protocol: TCP
                - containerPort: 30001
                  hostPort: 5001
                  protocol: TCP

    - name: Create kind cluster
      shell: kind create cluster --name chat-app --config /tmp/kind-config.yml --wait 90s

    - name: Set up kubeconfig for ubuntu user
      shell: |
        mkdir -p /home/ubuntu/.kube
        kind get kubeconfig --name chat-app > /home/ubuntu/.kube/config
        chown -R ubuntu:ubuntu /home/ubuntu/.kube

    - name: Verify cluster
      become_user: ubuntu
      command: kubectl get nodes

    # ─── COPY KUBERNETES FILES ──────────────────────────────────

    - name: Copy namespace
      copy:
        src: ../kubernetes/namespace.yml
        dest: /home/ubuntu/namespace.yml

    - name: Copy secrets
      copy:
        src: ../kubernetes/secrets.yml
        dest: /home/ubuntu/secrets.yml

    - name: Copy MongoDB PV
      copy:
        src: ../kubernetes/mongo-pv.yml
        dest: /home/ubuntu/mongo-pv.yml

    - name: Copy MongoDB PVC
      copy:
        src: ../kubernetes/mongo-pvc.yml
        dest: /home/ubuntu/mongo-pvc.yml

    - name: Copy MongoDB Deployment
      copy:
        src: ../kubernetes/mongo-deployment.yml
        dest: /home/ubuntu/mongo-deployment.yml

    - name: Copy MongoDB Service
      copy:
        src: ../kubernetes/mongo-service.yml
        dest: /home/ubuntu/mongo-service.yml

    - name: Copy Backend Deployment
      copy:
        src: ../kubernetes/b-deployment.yml
        dest: /home/ubuntu/b-deployment.yml

    - name: Copy Backend Service
      copy:
        src: ../kubernetes/b-service.yml
        dest: /home/ubuntu/b-service.yml

    - name: Copy Frontend Deployment
      copy:
        src: ../kubernetes/f-deployment.yml
        dest: /home/ubuntu/f-deployment.yml

    - name: Copy Frontend Service
      copy:
        src: ../kubernetes/f-service.yml
        dest: /home/ubuntu/f-service.yml

    # ─── APPLY IN ORDER ─────────────────────────────────────────

    - name: Apply Namespace
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/namespace.yml

    - name: Apply Secrets
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/secrets.yml

    - name: Apply MongoDB PV
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/mongo-pv.yml

    - name: Apply MongoDB PVC
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/mongo-pvc.yml

    - name: Apply MongoDB Deployment
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/mongo-deployment.yml

    - name: Apply MongoDB Service
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/mongo-service.yml

    - name: Wait for MongoDB to be ready
      become_user: ubuntu
      command: kubectl rollout status deployment/mongodb-deployment -n chat-app --timeout=120s
      retries: 3
      delay: 10

    - name: Apply Backend Deployment
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/b-deployment.yml

    - name: Apply Backend Service
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/b-service.yml

    - name: Apply Frontend Deployment
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/f-deployment.yml

    - name: Apply Frontend Service
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/f-service.yml

    # ─── UPDATE IMAGES ──────────────────────────────────────────

    - name: Update Backend Image
      become_user: ubuntu
      command: kubectl set image deployment/backend backend=madhul423/devops-backend:{{ image_tag }}
        -n chat-app


    - name: Update Frontend Image
      become_user: ubuntu
      command: kubectl set image deployment/frontend frontend=madhul423/devops-frontend:{{ image_tag }}
        -n chat-app

    # ─── WAIT FOR ROLLOUTS ──────────────────────────────────────

    - name: Wait for Backend Rollout
      become_user: ubuntu
      command: kubectl rollout status deployment/backend -n chat-app --timeout=120s

    - name: Wait for Frontend Rollout
      become_user: ubuntu
      command: kubectl rollout status deployment/frontend -n chat-app --timeout=120s

    # ─── VERIFY ─────────────────────────────────────────────────

    - name: Get all resources
      become_user: ubuntu
      command: kubectl get all -n chat-app