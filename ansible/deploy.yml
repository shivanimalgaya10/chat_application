- hosts: all
  become: true

  tasks:

    - name: Update packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Docker Compose
      apt:
        name: docker-compose
        state: present

    - name: Copy docker-compose file
      template:
        src: ../docker-compose.yml
        dest: /home/ubuntu/docker-compose.yml

    - name: Stop old containers        # ← ADD THIS
      command: docker-compose down
      args:
        chdir: /home/ubuntu
      ignore_errors: yes

    - name: Pull latest images         # ← ADD THIS
      command: docker-compose pull
      args:
        chdir: /home/ubuntu

    - name: Start containers
      command: docker-compose up -d
      args:
        chdir: /home/ubuntu